name: Deploy to Cloudways

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy via rsync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy plugin to Cloudways
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avz --delete
            --exclude='.git'
            --exclude='.github'
            --exclude='tests'
            --exclude='vendor'
            --exclude='node_modules'
            --exclude='composer.json'
            --exclude='composer.lock'
            --exclude='phpunit.xml.dist'
            --exclude='.phpcs.xml.dist'
            --exclude='.phpunit.result.cache'
            --exclude='CLAUDE.md'
            --exclude='.gitignore'
            --exclude='nm-pinterest-tools-v1'
          path: ./
          remote_path: /home/1077479.cloudwaysapps.com/kjqweekfey/public_html/wp-content/plugins/nm-pinterest-tools/
          remote_host: ${{ secrets.CLOUDWAYS_HOST }}
          remote_user: ${{ secrets.CLOUDWAYS_USER }}
          remote_key: ${{ secrets.CLOUDWAYS_SSH_KEY }}
